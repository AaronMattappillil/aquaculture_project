services:
  - type: web
    name: aquaculture-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PORT
        value: 8000
      - key: ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: aquaculture
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: MQTT_BROKER
        value: broker.hivemq.com
      - key: MQTT_PORT
        value: 1883
